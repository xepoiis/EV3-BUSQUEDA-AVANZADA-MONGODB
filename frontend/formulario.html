<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/nube.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/brite.css">
    <link rel="stylesheet" href="./css/estilos.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/jQuery v4.0.0.js"></script>
    <script src="./js/formulario.js"></script>

    <title>Formulario Registro</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./listado.html">Listado</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./formulario.html">Formulario Registro</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <br>

    <div class="container">
        <div class="row col">
            <div class="alert alert-danger" role="alert" id="errorFormulario">
                <p>Revise los siguientes errores en su formulario:</p>
                <ul id="listaErrores"></ul>
            </div>
        </div>
        <br>

        <form id="formularioRegistro">
            <p class="h1">Formulario de Registro y Cuenta Bancaria</p>
            <hr>

            <div class="container">
                <p class="h3">Datos Personales</p>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="input_nombre" class="form-label">* Nombre Usuario:</label>
                        <input class="form-control" type="text" name="nombre" id="input_nombre"
                            placeholder="Ingrese su nombre" onchange="validarInput(this)">
                    </div>

                    <div class="col">
                        <label for="inputRut" class="form-label">* Rut:</label>
                        <input type="text" name="rut" id="inputRut" class="form-control" placeholder="Ingrese su RUT" onchange="validaRut(this)">
                    </div>

                    <div class="col">
                        <label for="input_correo" class="form-label">* Correo Electrónico:</label>
                        <input class="form-control" type="email" name="correo" id="input_correo"
                            placeholder="Ingrese su nombre" onchange="validarCorreo(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputTelefono" class="form-label">Teléfono:</label>
                        <input type="text" name="telefono" id="inputTelefono" class="form-control">
                    </div>

                    <div class="col">
                        <label class="form-label" for="selectGenero">Género:</label>
                        <select class="form-select" name="genero" id="selectGenero">
                            <option selected value="">Seleccione su Género</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                            <option value="O">Otro</option>
                        </select>
                    </div>

                    <div class="col">
                        <label class="form-label" for="selectNacionalidad">* Nacionalidad:</label>
                        <select class="form-select" name="nacionalidad" id="selectNacionalidad"
                            onchange="validarInput(this)">
                            <option selected value="">Seleccione su Nacionalidad</option>
                        </select>
                    </div>

                    <div class="col">
                        <label for="inputNacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" class="form-control" name="fechaNacimiento" id="inputNacimiento">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="input_contrasena" class="form-label">* Contraseña:</label>
                        <input type="password" class="form-control" name="contrasena" id="input_contrasena"
                            onchange="validarContrasena(this)">
                    </div>

                    <div class="col">
                        <label for="input_rep_contrasena" class="form-label">* Repetir Contraseña:</label>
                        <input type="password" class="form-control" name="input_repetir_contrasena"
                            id="input_rep_contrasena" onchange="validarRepetirContrasena(this)">
                    </div>
                </div>
                <br>
                <hr>

                <p class="h3">Dirección</p>
                <br>

                <div class="row">
                    <div class="col">
                        <label class="form-label" for="selectComuna">* Comuna:</label>
                        <select class="form-select" name="comuna" id="selectComuna" onchange="validarInput(this)">
                            <option selected value="">Seleccione su Comuna</option>
                        </select>
                    </div>

                    <div class="col">
                        <label for="input_calle" class="form-label">* Calle:</label>
                        <input type="text" class="form-control" name="calle" id="input_calle"
                            onchange="validarInput(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="input_numero" class="form-label">* Número:</label>
                        <input type="text" class="form-control" name="numero" id="input_numero" onchange="validarInput(this)">
                    </div>

                    <div class="col">
                        <label for="input_departamento" class="form-label">Departamento/Oficina:</label>
                        <input type="text" class="form-control" name="departamento" id="input_departamento">
                    </div>

                    <div class="col">
                        <label for="input_codigoPostal" class="form-label">Código Postal:</label>
                        <input type="text" class="form-control" name="codigoPostal" id="input_codigoPostal">
                    </div>
                </div>
                <br>
                <hr>

                <p class="h3">Cuenta Bancaria</p>
                <br>
                
                <div class="row">
                    <div class="col">
                        <label for="inputBanco" class="form-label">* Banco:</label>
                        <input type="text" class="form-control" name="banco" id="inputBanco" onchange="validarInput(this)">
                    </div>
                    <div class="col">
                        <label for="selectTipoCuenta" class="form-label">* Tipo de Cuenta:</label>
                        <select class="form-select" name="tipoCuenta" id="selectTipoCuenta" onchange="validarInput(this)">
                            <option selected value="">Seleccione...</option>
                            <option value="Corriente">Corriente</option>
                            <option value="Vista">Vista</option>
                            <option value="Ahorro">Ahorro</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputNumeroCuenta" class="form-label">* Número de Cuenta:</label>
                        <input type="text" class="form-control" name="numeroCuenta" id="inputNumeroCuenta" onchange="validarInput(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="selectMoneda" class="form-label">* Moneda:</label>
                        <select class="form-select" name="moneda" id="selectMoneda" onchange="validarInput(this)">
                            <option selected value="">Seleccione...</option>
                            <option value="CLP">CLP - Peso Chileno</option>
                            <option value="USD">USD - Dólar</option>
                            <option value="EUR">EUR - Euro</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputSaldo" class="form-label">* Saldo Inicial:</label>
                        <input type="number" class="form-control" name="saldo" id="inputSaldo" onchange="validarInput(this)">
                    </div>
                    <div class="col">
                        <label for="inputFechaApertura" class="form-label">* Fecha de Apertura:</label>
                        <input type="date" class="form-control" name="fechaApertura" id="inputFechaApertura" onchange="validarInput(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="selectEstadoCuenta" class="form-label">* Estado:</label>
                        <select class="form-select" name="estado" id="selectEstadoCuenta" onchange="validarInput(this)">
                            <option selected value="">Seleccione...</option>
                            <option value="Activa">Activa</option>
                            <option value="Inactiva">Inactiva</option>
                            <option value="Bloqueada">Bloqueada</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputSucursal" class="form-label">Sucursal:</label>
                        <input type="text" class="form-control" name="sucursal" id="inputSucursal">
                    </div>
                    <div class="col">
                        <label for="inputTitular" class="form-label">* Titular (Nombre):</label>
                        <input type="text" class="form-control" name="titular" id="inputTitular" onchange="validarInput(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="validarFormulario()">Aceptar</button>
                    </div>
                </div>
                <hr>
                <div class="row">
                    <div class="col"><p>Los campos marcados con <strong>*</strong> son requeridos.</p></div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
